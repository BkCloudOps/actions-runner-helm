apiVersion: v2
name: arc-runner-stack
description: Configuration chart for GitHub Actions Runner infrastructure - ClusterSecretStore, ExternalSecrets, and namespaces
type: application
version: 1.0.0
appVersion: "0.9.3"

# NOTE: This chart provides configuration resources only.
# ARC, ESO, and cert-manager are deployed via GitOps (Flux HelmReleases).
# This chart creates:
# - ClusterSecretStore for Azure Key Vault (Workload Identity)
# - ExternalSecret definitions for syncing secrets
# - Service Account with Workload Identity annotations
# - Namespace definitions

maintainers:
  - name: BkCloudOps
    url: https://github.com/BkCloudOps

