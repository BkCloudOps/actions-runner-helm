# =============================================================================
# ARC Runner Stack - Configuration Values
# =============================================================================
# Umbrella chart for the GitHub Actions runner stack (controller + scale set).
#
# Scope of THIS chart:
#   - gha-runner-scale-set-controller (subchart)
#   - gha-runner-scale-set            (subchart)
#   - namespaces: arc-systems, arc-runners
#
# Explicitly OUT OF SCOPE (handled by the cluster bootstrap layer in
# actions-runner-gitops/infrastructure/controllers):
#   - cert-manager
#   - external-secrets-operator + ClusterSecretStore + ExternalSecret(s)
#   - Workload-Identity ServiceAccount for ESO
#
# Those addons are cluster-wide prerequisites and must be installed before
# this chart is reconciled.
# =============================================================================

# GitHub organization or repository URL
githubConfigUrl: "https://github.com/StrawHat-Enterprise"

# -----------------------------------------------------------------------------
# ARC Controller (gha-runner-scale-set-controller)
# -----------------------------------------------------------------------------
controller:
  enabled: true

gha-runner-scale-set-controller:
  # Controller configuration
  # See: https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set-controller/values.yaml
  replicaCount: 1
  
# -----------------------------------------------------------------------------
# Runner Scale Set (gha-runner-scale-set)
# -----------------------------------------------------------------------------
runnerScaleSet:
  enabled: true

gha-runner-scale-set:
  # Runner scale set configuration
  # See: https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set/values.yaml
  githubConfigUrl: "https://github.com/StrawHat-Enterprise"
  # Name of the K8s Secret holding the auth material. The Secret itself is
  # synced from Azure Key Vault by External Secrets Operator (bootstrap layer).
  githubConfigSecret: github-pat-secret

  # Minimum and maximum runners
  minRunners: 0
  maxRunners: 5

  # Scale-set name shown in the GitHub UI (defaults to the AutoscalingRunnerSet
  # metadata.name if unset). Override per-environment.
  runnerScaleSetName: "straw-hat-runners-linux"

  # Pre-existing GitHub runner group. Must already exist on GitHub; leave
  # as "default" unless a custom group has been created.
  runnerGroup: "default"

  # Container mode configuration
  containerMode:
    type: "dind"  # or "kubernetes"

  # Runner pod template. The image comes from this organization's GitHub
  # Container Registry; per-type overlays override the tag.
  template:
    spec:
      containers:
        - name: runner
          image: ghcr.io/strawhat-enterprise/actions-runner:linux-latest
          command: ["/home/runner/run.sh"]

# -----------------------------------------------------------------------------
# Namespaces created by this chart
# -----------------------------------------------------------------------------
namespaces:
  arcSystems: arc-systems
  arcRunners: arc-runners
