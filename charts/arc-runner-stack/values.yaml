# =============================================================================
# ARC Runner Stack - Configuration Values
# =============================================================================
# Configuration chart for GitHub Actions Runner infrastructure
# Provides ClusterSecretStore, ExternalSecrets, and namespace definitions
# =============================================================================

# GitHub organization or repository URL
githubConfigUrl: "https://github.com/BkCloudOps"

# Runner group name
runnerGroup: "straw-hat-runners-linux"

# Azure Key Vault configuration (for External Secrets)
keyVault:
  name: ""
  tenantId: ""
  
# Managed Identity for Workload Identity
managedIdentity:
  clientId: ""

# -----------------------------------------------------------------------------
# Cluster Secret Store (for Azure Key Vault)
# -----------------------------------------------------------------------------
clusterSecretStore:
  enabled: true
  name: azure-keyvault-store

# -----------------------------------------------------------------------------
# External Secrets (secrets to sync from Key Vault)
# -----------------------------------------------------------------------------
externalSecrets:
  enabled: true
  secrets:
    - name: github-pat-secret
      namespace: arc-runners
      secretKey: github_token
      remoteKey: github-pat

# -----------------------------------------------------------------------------
# Namespaces
# -----------------------------------------------------------------------------
namespaces:
  arcSystems: arc-systems
  arcRunners: arc-runners
  externalSecrets: external-secrets
