{{- if .Values.clusterSecretStore.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.clusterSecretStore.name }}
  labels:
    {{- include "arc-runner-stack.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://{{ .Values.keyVault.name }}.vault.azure.net
      tenantId: {{ .Values.keyVault.tenantId }}
      serviceAccountRef:
        name: external-secrets-sa
        namespace: {{ .Values.namespaces.externalSecrets }}
{{- end }}
