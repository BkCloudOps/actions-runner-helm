{{/*
Create required namespaces for the ARC stack
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.arcSystems }}
  labels:
    {{- include "arc-runner-stack.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.arcRunners }}
  labels:
    {{- include "arc-runner-stack.labels" . | nindent 4 }}
